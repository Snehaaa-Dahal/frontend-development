<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSS Animation Practice</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <h1>Our Coffee Blends</h1>

  <div class="cards-container">
    <div class="card">
      <div class="icon">&#9749;</div>
      <h3>Espresso</h3>
      <p>Bold and rich, brewed to perfection.</p>
      <button>Order Now</button>
    </div>
    <div class="card">
      <span class="badge">Popular</span>
      <div class="icon">&#127859;</div>
      <h3>Latte</h3>
      <p>Smooth and creamy, a café favorite.</p>
      <button>Order Now</button>
    </div>
    <div class="card">
      <div class="icon">&#129380;</div>
      <h3>Cold Brew</h3>
      <p>Slow-steeped for a refreshing taste.</p>
      <button>Order Now</button>
    </div>
  </div>

</body>
</html>
