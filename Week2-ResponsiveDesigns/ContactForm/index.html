<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Us - Coffee Corner</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="form-container">
    <h1>Contact Coffee Corner</h1>
    <p class="subtitle">We'd love to hear from you. Fill out the form below and we'll get back to you soon.</p>

    <form id="contactForm">
  <div class="form-group">
    <label for="name">Full Name</label>
    <input type="text" id="name" name="name" placeholder="Enter your name">
    <span class="error-message" id="nameError"></span>
  </div>

  <div class="form-group">
    <label for="email">Email Address</label>
    <input type="text" id="email" name="email" placeholder="Enter your email">
    <span class="error-message" id="emailError"></span>
  </div>

  <div class="form-group">
    <label for="phone">Phone Number</label>
    <input type="tel" id="phone" name="phone" placeholder="Enter your phone number">
  </div>

  <div class="form-group">
    <label for="service">Select a Service</label>
    <select id="service" name="service">
      <option value="">-- Choose an option --</option>
      <option value="dine-in">Dine In Reservation</option>
      <option value="catering">Catering Order</option>
      <option value="events">Private Events</option>
      <option value="feedback">Feedback</option>
    </select>
  </div>

  <div class="form-group">
    <label for="message">Message</label>
    <textarea id="message" name="message" rows="5" placeholder="Write your message here..."></textarea>
    <span class="error-message" id="messageError"></span>
  </div>

  <button type="submit">Send Message</button>

  <div class="success-message" id="successMessage">
    &#9989; Your message has been sent successfully!
  </div>
</form>
  </div>
  <script src="script.js"></script>

</body>
</html>
